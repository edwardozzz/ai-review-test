llm:
  provider: OLLAMA

  meta:
    model: mistral
    temperature: 0.2
    max_tokens: 2048

  http_client:
    api_url: http://host.docker.internal:11434
    timeout: 600
    headers: {}
    verify_ssl: false

  llm_kwargs: {}


vcs:
  provider: GITHUB

  pipeline:
    provider: GITHUB_ACTIONS
    workspace: /app

    owner: edwardozzz
    repo: ai-review-test

    pull_number: "7"
    sha: f374b2bde9d9d31ca284499ffce79563b57cb15d
    ref: refs/pull/7/head

  http_client:
    api_url: https://api.github.com
    api_token: ${GITHUB_TOKEN}
    timeout: 60
    headers: {}
    verify_ssl: true

  owner: edwardozzz
  repository: ai-review-test
  pull_number: "7"


review:
  fail_on_severity: NONE
  max_files: 100
  max_diff_size: 500000
  exclude_paths: []
  include_extensions: []


runtime:
  dry_run: true
  clear_inline_comments: false
  parallelism: 1

